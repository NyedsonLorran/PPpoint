<link rel="stylesheet" href="./css/amigos.css">

<div class="retro-slide bg-amigos" id="slide-amigos">

  <div class="amigos-content">

    <div class="amigos-header">
      <h1 class="amigos-title">PP POINT 2026</h1>

      <p class="amigos-sub">
        DO PRIMEIRO AO TRIGÉSIMO PRIMEIRO DIA,
      </p>

      <p class="amigos-sub2">
        ESSE FOI O SEU TOP 3 OFICIAL DE<br>
        PARCERIAS DO PARQUE DO POVO
      </p>
    </div>

    <!-- Imagem -->
    <div class="amigos-img-wrapper">
      <img
        src="./css/imagens/amigos.png"
        alt="brinde"
        class="amigos-brinde-img"
        onerror="this.style.display='none'"
      >
    </div>

    <!-- Ranking -->
    <div class="amigos-ranking" id="amigosRanking">
      <!-- preenchido via JS -->
    </div>

  </div>

</div>

<script>
(function () {

  const DEV_ORIGINS = ["localhost", "127.0.0.1"];

  const API_URL = DEV_ORIGINS.includes(window.location.hostname)
    ? "http://localhost:8080"
    : "https://pppoint-backend.onrender.com";

  async function carregarAmigos() {

    try {

      const token = sessionStorage.getItem("token");

      if (!token) return;

      const res = await fetch(`${API_URL}/registros/usuario/amigos`, {
        headers: {
          Authorization: `Bearer ${token}`
        }
      });

      if (!res.ok) return;

      const dados = await res.json();

      const container = document.getElementById("amigosRanking");

      if (!container) return;

      if (!dados.top3 || dados.top3.length === 0) {

        container.innerHTML = `
          <div class="amigos-sem-dados">
            Nenhum acompanhante registrado ainda!
          </div>
        `;

        return;
      }

      const classes = [
        "amigo-rank-1",
        "amigo-rank-2",
        "amigo-rank-3"
      ];

      const nums = ["1", "2", "3"];

      container.innerHTML = dados.top3.map((item, i) => `
        <div class="amigo-rank-item ${classes[i]}">

          <span class="amigo-rank-num">
            ${nums[i]}
          </span>

          <span class="amigo-rank-insta">
            ${
              item.instagram
                ? "@" + item.instagram.replace(/^@/, "")
                : item.nome
            }
          </span>

        </div>
      `).join("");

    } catch (e) {

      console.warn("Amigos retro: erro", e);

    }

  }

  carregarAmigos();

})();
</script>
